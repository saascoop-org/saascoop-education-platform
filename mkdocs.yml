site_name: SaaSCoop Education
site_description: Open learning paths for Software Engineering, Data, AI and Open Source.
site_url: https://saascoop-org.github.io/saascoop-education-platform/
repo_url: https://github.com/saascoop-org/saascoop-education-platform
repo_name: saascoop-org/saascoop-education-platform

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - assets/styles/saascoop.css
extra_javascript:
  - assets/js/language-redirect.js

nav:
  - Home: index.md
  - English:
      - Start: en/index.md
      - Learning Paths: en/learning-paths.md
      - Community: en/community.md
      - Roadmap: en/roadmap.md
  - Português:
      - Início: pt-BR/index.md
      - Trilhas: pt-BR/learning-paths.md
      - Comunidade: pt-BR/community.md
      - Roadmap: pt-BR/roadmap.md
  - Español:
      - Inicio: es/index.md
      - Rutas: es/learning-paths.md
      - Comunidad: es/community.md
      - Roadmap: es/roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
